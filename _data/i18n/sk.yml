about:
  title: O mne
  quote: "Poďme sa spoločne pozrieť na svetové unikáty, prejdime sa po zemi plnej utrpenia."
  p1: >-
    Volám sa Marián Derco. Som rodák z Nižnej Jedľovej – obce spod Dukly.
    Na svojich cestách po svete (Anglicko, USA, Rusko, Bielorusko, Nemecko,
    Rakúsko, Srbsko, Grécko a Turecko) som si uvedomil krásu obyčajnosti
    a nezvyčajnosti nášho severovýchodu Slovenska.
  p2: >-
    Rástol som spolu s príbehmi a zážitkami nielen z 2. svetovej vojny.
    Napriek ťažkým existenčným podmienkam moji predkovia ostali v tomto kraji.
    Po prechode frontu počas 2. svetovej vojny mojej babke Anne ostala krava
    a jej vlastná perina. Už 17 rokov bývam v malej dedinke Medvedie, ktorá
    leží medzi Dukelským bojiskom a Údolím smrti.
  p3: >-
    Severovýchodom sa prehnali mongolsko-tatárske vpády, neskôr protihabsburské
    povstania, roky meruôsme, boj za národnú identitu Rusínov, veľká emigrácia
    do nového sveta a 1. a 2. svetová vojna natrvalo vryli pečať tomuto kraju.
  p4: >-
    Kraj pod Duklou, ale aj Horný Šariš a Horný Zemplín sú pre bežných
    návštevníkov neprebádané územia – terra incognita. Príďte a uvidíte, že na
    severovýchode je nádherná príroda, kultúrne, duchovné a vojenské pamiatky
    a ešte stále tu žijú srdeční ľudia. Objavme drevené chrámy, ktoré sú tichými
    miestami modlitby. Nadýchajme sa sviežeho vzduchu a naberme nové sily.


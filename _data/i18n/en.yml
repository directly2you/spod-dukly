about:
  title: About me
  quote: "Let's explore world-class rarities together and walk across a land full of suffering."
  p1: >-
    My name is Marián Derco. I was born in Nižná Jedľová, a village below the
    Dukla Pass. On my travels around the world (England, the USA, Russia,
    Belarus, Germany, Austria, Serbia, Greece and Turkey) I came to appreciate
    the beauty of the ordinary and the extraordinary in the north-east of
    Slovakia.
  p2: >-
    I grew up with stories and memories, not only from the Second World War.
    Despite hard living conditions, my ancestors stayed in this land. After the
    front passed through during WWII, my grandmother Anna was left with a cow
    and her own duvet. For 17 years I have lived in the small village of
    Medvedie, which lies between the Dukla battlefield and the Valley of Death.
  p3: >-
    The north-east was swept by Mongol-Tatar invasions, later anti-Habsburg
    uprisings, the revolutions of 1848, the struggle for the national identity
    of the Rusyns, the great emigration to the New World, and the First and
    Second World Wars left a permanent mark on this land.
  p4: >-
    The land below Dukla, together with Upper Šariš and Upper Zemplín, remains
    terra incognita for ordinary visitors. Come and see for yourself: the
    north-east offers beautiful nature, cultural, spiritual and military
    monuments — and warm-hearted people still live here. Let's discover wooden
    churches that are quiet places of prayer, breathe in the fresh air and
    gather new strength.

